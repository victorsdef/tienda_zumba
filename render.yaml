services:
  # ── BACKEND ────────────────────────────────────────────────────
  - type: web
    name: sofia-couture-backend
    runtime: docker
    plan: free
    region: virginia
    rootDir: back/backend
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - back/backend/**
        - render.yaml
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080

      # Base de datos (inyectada automáticamente desde el servicio DB de Render)
      - key: DB_URL
        fromDatabase:
          name: sofia-couture-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: sofia-couture-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sofia-couture-db
          property: password

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: JWT_REFRESH_EXPIRATION
        value: 604800000

      # URLs — Render las inyecta automáticamente
      - key: APP_UPLOAD_DIR
        value: /tmp/uploads
      - key: APP_BASE_URL
        fromService:
          type: web
          name: sofia-couture-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_FRONTEND_URL
        fromService:
          type: web
          name: sofia-couture-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: PAYPHONE_RESPONSE_BASE_URL
        fromService:
          type: web
          name: sofia-couture-frontend
          envVarKey: RENDER_EXTERNAL_URL

      # Email Gmail — ponlos en el dashboard de Render después del primer deploy
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: APP_MAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # Payphone — ponlos en el dashboard de Render
      - key: PAYPHONE_TOKEN
        sync: false
      - key: PAYPHONE_STORE_ID
        sync: false

  # ── FRONTEND ───────────────────────────────────────────────────
  - type: web
    name: sofia-couture-frontend
    runtime: docker
    plan: free
    region: virginia
    rootDir: front/frontend
    dockerfilePath: Dockerfile
    healthCheckPath: /
    autoDeploy: true
    buildFilter:
      paths:
        - front/frontend/**
        - render.yaml
    envVars:
      # Esta var se usa como build arg en el Dockerfile para que Vite la embeba
      - key: VITE_API_URL
        value: /api/nueva-arquitectura
      # Payphone — ponlos en el dashboard de Render
      - key: VITE_PAYPHONE_TOKEN
        sync: false
      - key: VITE_PAYPHONE_STORE_ID
        sync: false
      # URL interna del backend para que nginx haga proxy
      - key: BACKEND_URL
        fromService:
          type: web
          name: sofia-couture-backend
          envVarKey: RENDER_EXTERNAL_URL

# ── BASE DE DATOS ──────────────────────────────────────────────
databases:
  - name: sofia-couture-db
    plan: free
    region: virginia
    databaseName: sofiacouture
    user: sofiauser
