# ─── DESARROLLO LOCAL ───────────────────────────────────────────
# Lee vars del .env raíz via docker-compose, o de DEV_* como fallback directo
spring.datasource.url=${DB_URL:${DEV_DB_URL:jdbc:postgresql://localhost:5432/sofiacouture}}
spring.datasource.username=${DB_USERNAME:${DEV_DB_USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${DEV_DB_PASSWORD:VictorSdef/17}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.tiendaropa=DEBUG
logging.level.org.springframework.web=INFO

# Payphone
payphone.token=${PAYPHONE_TOKEN:}
payphone.store-id=${PAYPHONE_STORE_ID:}
payphone.response-base-url=${PAYPHONE_RESPONSE_BASE_URL:http://localhost:5173}
