# ─── PRODUCCIÓN (Render) ────────────────────────────────────────
# Todas las variables vienen de las env vars configuradas en Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.com.tiendaropa=INFO
logging.level.root=WARN

# Payphone
payphone.token=${PAYPHONE_TOKEN:}
payphone.store-id=${PAYPHONE_STORE_ID:}
payphone.response-base-url=${PAYPHONE_RESPONSE_BASE_URL:}
