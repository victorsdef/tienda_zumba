# ─── DESARROLLO LOCAL ───────────────────────────────────────────
# Prioriza variables de Docker/local y si no existen usa fallback local
spring.datasource.url=${DB_URL:${DEV_DB_URL:jdbc:postgresql://localhost:5432/sofiacouture}}
spring.datasource.username=${DB_USERNAME:${DEV_DB_USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${DEV_DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logs más detallados en dev
logging.level.com.tiendaropa=DEBUG
logging.level.org.springframework.web=INFO

# Payphone (pruebas)
payphone.token=${PAYPHONE_TOKEN:}
payphone.store-id=${PAYPHONE_STORE_ID:}
payphone.response-base-url=${PAYPHONE_RESPONSE_BASE_URL:http://localhost:5173}
