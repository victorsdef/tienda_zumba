server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy al backend publico en Render
    location /api/ {
        proxy_pass https://sofia-couture-backend.onrender.com/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host sofia-couture-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
