version: '3.9'

services:

  # ── Base de datos PostgreSQL ───────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sofiacouture_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sofiacouture
      POSTGRES_USER: sofiauser
      POSTGRES_PASSWORD: sofiapass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sofiauser -d sofiacouture"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ────────────────────────────────────────
  backend:
    build:
      context: ./back/backend
    container_name: sofiacouture_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/sofiacouture
      DB_USERNAME: sofiauser
      DB_PASSWORD: sofiapass
      JWT_SECRET: cambia_este_secreto_en_produccion_minimo_32_chars
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      APP_UPLOAD_DIR: /uploads
      APP_BASE_URL: http://localhost:8080
      APP_FRONTEND_URL: http://localhost
      SPRING_MAIL_USERNAME: sofia1278zamura@gmail.com
      SPRING_MAIL_PASSWORD: fgxezcoxehwhwqvm
      PAYPHONE_TOKEN: ${PAYPHONE_TOKEN}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID}
      PAYPHONE_RESPONSE_BASE_URL: http://localhost
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/uploads

  # ── Frontend React + Nginx ─────────────────────────────────────
  frontend:
    build:
      context: ./front/frontend
      args:
        VITE_API_URL: /api
    container_name: sofiacouture_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
