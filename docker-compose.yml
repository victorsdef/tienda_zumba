services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sofiacouture}
      POSTGRES_USER: ${POSTGRES_USER:-sofiauser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sofiauser} -d ${POSTGRES_DB:-sofiacouture}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back/backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-sofiacouture}
      DB_USERNAME: ${POSTGRES_USER:-sofiauser}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      APP_UPLOAD_DIR: ${APP_UPLOAD_DIR:-/uploads}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-Sofia Couture EC <no-reply@example.com>}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      PAYPHONE_TOKEN: ${PAYPHONE_TOKEN}
      PAYPHONE_STORE_ID: ${PAYPHONE_STORE_ID}
      PAYPHONE_RESPONSE_BASE_URL: ${PAYPHONE_RESPONSE_BASE_URL:-http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/uploads

  frontend:
    build:
      context: ./front/frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  uploads_data:
